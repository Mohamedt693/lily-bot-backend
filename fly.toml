# fly.toml app configuration file generated for lily-bot-backend on 2026-06-11T09:54:07Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lily-bot-backend'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1